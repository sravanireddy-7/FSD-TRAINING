```
<div class="card">

    <div class="card-body p-4">

        <h2 class="text-center mb-4">
            Event Registration Form
        </h2>

        <div class="alert alert-success">
            Registration Successful! Thank you for registering.
        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Student Name
                </label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter your name"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Roll Number
                </label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter roll number"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Branch
                </label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter branch"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       class="form-control"
                       placeholder="Enter email"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Mobile Number
                </label>

                <input type="tel"
                       class="form-control"
                       placeholder="Enter mobile number"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Select Event
                </label>

                <select class="form-select">

                    <option selected disabled>
                        Choose Event
                    </option>

                    <option>Technical Quiz</option>
                    <option>Hackathon</option>
                    <option>Poster Presentation</option>
                    <option>Coding Contest</option>
                    <option>Project Expo</option>
                    <option>Cultural Fest</option>

                </select>
            </div>

            <div class="text-center">

                <button type="submit"
                        class="btn btn-primary px-5">
                    Register
                </button>

            </div>

        </form>

    </div>

</div>
