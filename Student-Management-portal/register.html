<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 15px;
}

.card-header {
    font-weight: bold;
    letter-spacing: 1px;
}

.btn-primary {
    width: 150px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Campus Connect</a>

        <div class="ms-auto">
            <a href="login.html" class="btn btn-outline-light me-2">Login</a>
            <a href="register.html" class="btn btn-primary">Register</a>
        </div>
    </div>
</nav>

<!-- FORM -->
<div class="container my-5">
<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">
    <h3>Student Registration Form</h3>
</div>

<div class="card-body">

<form id="registerForm">

<div class="row g-3">

    <div class="col-md-6">
        <input type="text" id="name" class="form-control" placeholder="Full Name" required>
    </div>

    <div class="col-md-6">
        <input type="text" id="rollNo" class="form-control" placeholder="Roll Number" required>
    </div>

    <div class="col-md-6">
        <input type="email" id="email" class="form-control" placeholder="Email" required>
    </div>

    <div class="col-md-6">
        <input type="text" id="mobile" class="form-control" placeholder="Mobile Number" required>
    </div>

    <div class="col-md-6">
        <select id="gender" class="form-control" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="col-md-6">
        <select id="branch" class="form-control" required>
            <option value="">Select Branch</option>
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>Civil</option>
            <option>Mechanical</option>
        </select>
    </div>

    <div class="col-md-12">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>

</div>

<div class="text-center mt-4">

    <button type="reset" class="btn btn-secondary me-2">
        Reset
    </button>

    <button type="submit" class="btn btn-primary">
        Register
    </button>

</div>

</form>

</div>
</div>

</div>
</div>
</div>

<!-- JS -->
<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        rollNo: document.getElementById("rollNo").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        gender: document.getElementById("gender").value,
        branch: document.getElementById("branch").value,
        password: document.getElementById("password").value
    };

    fetch("http://localhost:8080/auth/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        alert("Registration Successful!");
        window.location.href = "login.html";
    })
    .catch(() => {
        alert("Registration Failed!");
    });

});
</script>

</body>
</html>
